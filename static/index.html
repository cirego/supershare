<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Super Share</title>
<style>
  :root {
    --primary: #6c5ce7;
    --primary-dark: #5a4bd1;
    --accent: #00cec9;
    --bg: #0f0f1a;
    --surface: #1a1a2e;
    --surface2: #222240;
    --text: #e8e8f0;
    --text-dim: #8888aa;
    --border: #333355;
    --success: #00b894;
    --danger: #e17055;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
  }

  .container {
    max-width: 720px;
    margin: 0 auto;
    padding: 2rem 1.5rem;
  }

  header {
    text-align: center;
    margin-bottom: 3rem;
  }

  header h1 {
    font-size: 2.8rem;
    font-weight: 800;
    background: linear-gradient(135deg, var(--primary), var(--accent));
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    margin-bottom: 0.5rem;
  }

  header p {
    color: var(--text-dim);
    font-size: 1.1rem;
  }

  .section {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 1.5rem;
    margin-bottom: 1.5rem;
  }

  .section h2 {
    font-size: 1.1rem;
    font-weight: 600;
    margin-bottom: 1rem;
    color: var(--accent);
    text-transform: uppercase;
    letter-spacing: 0.05em;
    font-size: 0.85rem;
  }

  .input-row {
    display: flex;
    gap: 0.75rem;
  }

  input[type="text"] {
    flex: 1;
    padding: 0.7rem 1rem;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 8px;
    color: var(--text);
    font-size: 0.95rem;
    outline: none;
    transition: border-color 0.2s;
  }

  input[type="text"]:focus {
    border-color: var(--primary);
  }

  button {
    padding: 0.7rem 1.2rem;
    border: none;
    border-radius: 8px;
    font-size: 0.9rem;
    font-weight: 600;
    cursor: pointer;
    transition: all 0.2s;
    white-space: nowrap;
  }

  .btn-primary {
    background: var(--primary);
    color: white;
  }
  .btn-primary:hover { background: var(--primary-dark); }
  .btn-primary:disabled {
    opacity: 0.5;
    cursor: not-allowed;
  }

  .btn-accent {
    background: var(--accent);
    color: var(--bg);
  }
  .btn-accent:hover { opacity: 0.85; }

  .btn-small {
    padding: 0.4rem 0.7rem;
    font-size: 0.8rem;
    border-radius: 6px;
  }

  .btn-outline {
    background: transparent;
    border: 1px solid var(--border);
    color: var(--text-dim);
  }
  .btn-outline:hover {
    border-color: var(--text-dim);
    color: var(--text);
  }

  /* Recent shares */
  .shares-list { display: flex; flex-direction: column; gap: 0.75rem; }

  .share-item {
    background: var(--surface2);
    border-radius: 8px;
    padding: 1rem;
  }

  .share-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 0.6rem;
    gap: 0.5rem;
  }

  .share-filename {
    font-weight: 600;
    font-size: 0.95rem;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
    flex: 1;
  }

  .share-actions {
    display: flex;
    gap: 0.4rem;
    flex-shrink: 0;
  }

  .compression-bar-container {
    display: flex;
    align-items: center;
    gap: 0.75rem;
  }

  .compression-bar-bg {
    flex: 1;
    height: 8px;
    background: var(--border);
    border-radius: 4px;
    overflow: hidden;
  }

  .compression-bar-fill {
    height: 100%;
    border-radius: 4px;
    background: linear-gradient(90deg, var(--accent), var(--primary));
    transition: width 0.5s ease;
    min-width: 2px;
  }

  .compression-label {
    font-size: 0.8rem;
    font-weight: 700;
    color: var(--accent);
    white-space: nowrap;
    min-width: 5rem;
    text-align: right;
  }

  .share-meta {
    font-size: 0.75rem;
    color: var(--text-dim);
    margin-top: 0.4rem;
  }

  .empty-state {
    text-align: center;
    color: var(--text-dim);
    padding: 2rem 0;
    font-style: italic;
  }

  /* Upload area */
  .upload-zone {
    border: 2px dashed var(--border);
    border-radius: 8px;
    padding: 2rem;
    text-align: center;
    cursor: pointer;
    transition: border-color 0.2s, background 0.2s;
    margin-bottom: 1rem;
  }

  .upload-zone:hover, .upload-zone.dragover {
    border-color: var(--primary);
    background: rgba(108, 92, 231, 0.05);
  }

  .upload-zone p {
    color: var(--text-dim);
    margin-bottom: 0.75rem;
  }

  .staged-files {
    margin-bottom: 1rem;
  }

  .staged-file {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 0.5rem 0.75rem;
    background: var(--surface2);
    border-radius: 6px;
    margin-bottom: 0.4rem;
    font-size: 0.9rem;
  }

  .staged-file .remove {
    color: var(--danger);
    cursor: pointer;
    background: none;
    border: none;
    font-size: 1.1rem;
    padding: 0 0.3rem;
  }

  .file-size {
    color: var(--text-dim);
    font-size: 0.8rem;
    margin-left: 0.5rem;
  }

  .toast {
    position: fixed;
    bottom: 2rem;
    left: 50%;
    transform: translateX(-50%) translateY(100px);
    background: var(--surface2);
    border: 1px solid var(--accent);
    color: var(--text);
    padding: 0.7rem 1.5rem;
    border-radius: 8px;
    font-size: 0.9rem;
    transition: transform 0.3s ease;
    z-index: 100;
  }

  .toast.visible {
    transform: translateX(-50%) translateY(0);
  }

  .loading {
    display: inline-block;
    width: 16px;
    height: 16px;
    border: 2px solid var(--border);
    border-top-color: var(--accent);
    border-radius: 50%;
    animation: spin 0.6s linear infinite;
    vertical-align: middle;
    margin-right: 0.4rem;
  }

  @keyframes spin { to { transform: rotate(360deg); } }
</style>
</head>
<body>

<div class="container">
  <header>
    <h1>Super Share</h1>
    <p>AI-powered file sharing with infinite compression</p>
  </header>

  <!-- Download Share -->
  <div class="section">
    <h2>Download a Share</h2>
    <div class="input-row">
      <input type="text" id="shareInput" placeholder="Paste a share link or filename...">
      <button class="btn-primary" onclick="downloadShare()">Download</button>
    </div>
  </div>

  <!-- Recent Shares -->
  <div class="section">
    <h2>Recent Shares</h2>
    <div id="sharesList" class="shares-list">
      <div class="empty-state">No shares yet. Create one below!</div>
    </div>
  </div>

  <!-- Create New Share -->
  <div class="section">
    <h2>Create New Share</h2>
    <input type="file" id="fileInput" multiple style="display:none">
    <input type="file" id="folderInput" webkitdirectory style="display:none">
    <div class="upload-zone" id="uploadZone" onclick="document.getElementById('fileInput').click()">
      <p>Drop files or folders here, or click to browse</p>
      <div style="display:flex;gap:0.5rem;justify-content:center">
        <button class="btn-outline btn-small" onclick="event.stopPropagation(); document.getElementById('fileInput').click()">Add Files</button>
        <button class="btn-outline btn-small" onclick="event.stopPropagation(); document.getElementById('folderInput').click()">Add Folder</button>
      </div>
    </div>
    <div id="stagedFiles" class="staged-files"></div>
    <button class="btn-accent" id="createBtn" onclick="createShare()" disabled>Create Share</button>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
  let sessionId = null;
  let stagedFiles = [];
  let ws = null;

  // WebSocket connection
  function connectWS() {
    const proto = location.protocol === 'https:' ? 'wss:' : 'ws:';
    ws = new WebSocket(`${proto}//${location.host}/ws`);
    ws.onmessage = (e) => {
      const msg = JSON.parse(e.data);
      if (msg.type === 'shares') renderShares(msg.shares);
    };
    ws.onclose = () => setTimeout(connectWS, 2000);
  }
  connectWS();

  // Render shares
  function renderShares(shares) {
    const el = document.getElementById('sharesList');
    if (!shares.length) {
      el.innerHTML = '<div class="empty-state">No shares yet. Create one below!</div>';
      return;
    }
    el.innerHTML = shares.map(s => {
      const nameBytes = new TextEncoder().encode(s.filename).length;
      const ratio = s.original_size / nameBytes;
      const barWidth = Math.min(100, Math.max(1, (1 / ratio) * 100 * 500));
      return `
        <div class="share-item">
          <div class="share-header">
            <span class="share-filename" title="${esc(s.filename)}">${esc(s.filename)}</span>
            <div class="share-actions">
              <button class="btn-outline btn-small" onclick="copyLink('${esc(s.filename)}')">Copy Link</button>
              <a href="/share/${encodeURIComponent(s.filename)}" class="btn-primary btn-small" style="text-decoration:none;display:inline-block;">Download</a>
            </div>
          </div>
          <div class="compression-bar-container">
            <div class="compression-bar-bg">
              <div class="compression-bar-fill" style="width:${barWidth}%"></div>
            </div>
            <span class="compression-label">${formatRatio(ratio)}x savings</span>
          </div>
          <div class="share-meta">${formatSize(s.original_size)} compressed to ${nameBytes} bytes</div>
        </div>
      `;
    }).join('');
  }

  function formatRatio(r) {
    if (r >= 1000000) return (r / 1000000).toFixed(1) + 'M';
    if (r >= 1000) return (r / 1000).toFixed(1) + 'K';
    return r.toFixed(1);
  }

  function formatSize(bytes) {
    if (bytes >= 1073741824) return (bytes / 1073741824).toFixed(1) + ' GB';
    if (bytes >= 1048576) return (bytes / 1048576).toFixed(1) + ' MB';
    if (bytes >= 1024) return (bytes / 1024).toFixed(1) + ' KB';
    return bytes + ' B';
  }

  function esc(s) {
    const d = document.createElement('div');
    d.textContent = s;
    return d.innerHTML;
  }

  // Download share
  function downloadShare() {
    const input = document.getElementById('shareInput');
    let val = input.value.trim();
    if (!val) return;

    // Extract filename from full URL if needed
    const shareMatch = val.match(/\/share\/(.+)$/);
    if (shareMatch) val = decodeURIComponent(shareMatch[1]);

    window.location.href = '/share/' + encodeURIComponent(val);
  }

  // Copy link
  function copyLink(filename) {
    const url = `${location.origin}/share/${encodeURIComponent(filename)}`;
    navigator.clipboard.writeText(url).then(() => showToast('Link copied!'));
  }

  // File upload
  const fileInput = document.getElementById('fileInput');
  const folderInput = document.getElementById('folderInput');
  const uploadZone = document.getElementById('uploadZone');

  fileInput.addEventListener('change', (e) => {
    addFiles(e.target.files);
    fileInput.value = '';
  });

  folderInput.addEventListener('change', (e) => {
    addFiles(e.target.files);
    folderInput.value = '';
  });

  uploadZone.addEventListener('dragover', (e) => {
    e.preventDefault();
    uploadZone.classList.add('dragover');
  });

  uploadZone.addEventListener('dragleave', () => {
    uploadZone.classList.remove('dragover');
  });

  uploadZone.addEventListener('drop', async (e) => {
    e.preventDefault();
    uploadZone.classList.remove('dragover');
    // Handle dropped folders via DataTransferItem.webkitGetAsEntry
    const items = e.dataTransfer.items;
    if (items && items.length > 0 && items[0].webkitGetAsEntry) {
      const allFiles = [];
      const promises = [];
      for (const item of items) {
        const entry = item.webkitGetAsEntry();
        if (entry) promises.push(traverseEntry(entry, allFiles));
      }
      await Promise.all(promises);
      addFiles(allFiles);
    } else {
      addFiles(e.dataTransfer.files);
    }
  });

  function traverseEntry(entry, fileList) {
    return new Promise((resolve) => {
      if (entry.isFile) {
        entry.file((f) => { fileList.push(f); resolve(); });
      } else if (entry.isDirectory) {
        const reader = entry.createReader();
        reader.readEntries(async (entries) => {
          await Promise.all(entries.map(e => traverseEntry(e, fileList)));
          resolve();
        });
      } else {
        resolve();
      }
    });
  }

  function addFiles(fileList) {
    for (const f of fileList) {
      stagedFiles.push(f);
    }
    renderStaged();
    uploadFiles(fileList);
  }

  function removeFile(idx) {
    stagedFiles.splice(idx, 1);
    renderStaged();
    // Re-upload all files with new session
    sessionId = null;
    if (stagedFiles.length > 0) {
      uploadFiles(stagedFiles);
    }
  }

  function renderStaged() {
    const el = document.getElementById('stagedFiles');
    document.getElementById('createBtn').disabled = stagedFiles.length === 0;
    if (!stagedFiles.length) {
      el.innerHTML = '';
      return;
    }
    el.innerHTML = stagedFiles.map((f, i) => `
      <div class="staged-file">
        <span>${esc(f.name)}<span class="file-size">${formatSize(f.size)}</span></span>
        <button class="remove" onclick="removeFile(${i})">&times;</button>
      </div>
    `).join('');
  }

  async function uploadFiles(files) {
    const form = new FormData();
    if (sessionId) form.append('session_id', sessionId);
    for (const f of files) {
      form.append('files', f);
    }
    const res = await fetch('/upload', { method: 'POST', body: form });
    const data = await res.json();
    sessionId = data.session_id;
  }

  async function createShare() {
    if (!sessionId || stagedFiles.length === 0) return;

    const btn = document.getElementById('createBtn');
    btn.disabled = true;
    btn.innerHTML = '<span class="loading"></span>Creating...';

    const res = await fetch('/create-share', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ session_id: sessionId }),
    });
    const data = await res.json();

    stagedFiles = [];
    sessionId = null;
    renderStaged();
    btn.textContent = 'Create Share';
    btn.disabled = true;

    if (data.shares && data.shares.length) {
      showToast(`${data.shares.length} file(s) shared!`);
    }
  }

  function showToast(msg) {
    const el = document.getElementById('toast');
    el.textContent = msg;
    el.classList.add('visible');
    setTimeout(() => el.classList.remove('visible'), 2500);
  }

  // Enter key on share input
  document.getElementById('shareInput').addEventListener('keydown', (e) => {
    if (e.key === 'Enter') downloadShare();
  });
</script>

</body>
</html>
